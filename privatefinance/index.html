    var pass = pwEl.value.trim();
    if (!pass) return;
    goEl.disabled = true; goEl.textContent = "解密中…"; errEl.textContent = "";

      var bin = Uint8Array.from(atob(PAYLOAD), function (c) { return c.charCodeAt(0); });
