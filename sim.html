<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Balance Simulator — runs the real battle engine headlessly</title>
</head>
<body>
<div id="battle-grid" style="display:none;"></div>
<pre id="sim-status">loading…</pre>
<script type="module">
// ============================================================
// Headless balance simulator.
// Virtualizes Date.now / setInterval / setTimeout BEFORE importing
// the real battle engine, then drives combat ticks synchronously.
// Zero game logic is reimplemented here — battles use battle.js as-is.
// ============================================================

let vt = 1_000_000;            // virtual clock (ms)
let tickFn = null;             // captured combat tick
let tickMs = 150;
let intervalAlive = false;
let timeoutQueue = [];         // { at, fn }
let timeoutSeq = 1;

Date.now = () => vt;
window.setInterval = (fn, ms) => { tickFn = fn; tickMs = ms; intervalAlive = true; return 424242; };
window.clearInterval = (id) => { if (id === 424242) intervalAlive = false; };
window.setTimeout = (fn, ms) => { const id = timeoutSeq++; timeoutQueue.push({ at: vt + (ms || 0), fn, id }); return id; };
window.clearTimeout = (id) => { timeoutQueue = timeoutQueue.filter(t => t.id !== id); };

const units = await import('./js/units.js?v=24');
const battle = await import('./js/battle.js?v=26');
const { UNIT_TEMPLATES, FATE_TEMPLATES } = units;

const HEROES = Object.values(UNIT_TEMPLATES)
    .filter(t => ['shu', 'wei', 'wu', 'qun'].includes(t.faction))
    .map(t => t.id);

// --- formation: front-to-back by range, mirroring game placement rules ---
function placeTeam(ids) {
    const cols = [3, 4, 2, 5];
    const rowFor = (r) => (r <= 1 ? 6 : r <= 3 ? 7 : 8);
    const used = new Set();
    return ids.map(id => {
        const t = UNIT_TEMPLATES[id];
        let y = rowFor(t.range);
        let x = cols.find(c => !used.has(c + ',' + y));
        if (x === undefined) { y += 1; x = cols.find(c => !used.has(c + ',' + y)); }
        used.add(x + ',' + y);
        return { templateId: id, star: 1, skillLevel: 1, x, y, isBuilding: false, equippedSkill: null };
    });
}

// --- replicate game.js checkActiveFates for the player side ---
function computeFates(ids) {
    const set = new Set(ids);
    const fates = [];
    for (const k in FATE_TEMPLATES) {
        const f = FATE_TEMPLATES[k];
        const need = f.minCount || f.requiredIds.length;
        if (f.requiredIds.filter(id => set.has(id)).length >= need) fates.push(f.id);
    }
    const fc = { shu: 0, wei: 0, wu: 0, qun: 0 };
    new Set(ids).forEach(id => { const f = UNIT_TEMPLATES[id].faction; if (fc[f] !== undefined) fc[f]++; });
    const factions = {};
    for (const f in fc) factions[f] = fc[f] >= 4 ? 2 : fc[f] >= 2 ? 1 : 0;
    return { fates, factions };
}

// --- run one battle, real engine, virtual time ---
const MAX_MS = 90_000;
function runMatch(teamA, teamB, seed) {
    timeoutQueue = [];
    intervalAlive = false;
    tickFn = null;
    let result; // true = A wins, false = B wins, undefined = draw/timeout

    const a = placeTeam(teamA);
    const b = placeTeam(teamB);
    const { fates, factions } = computeFates(teamA);

    battle.initBattle(a, 1, (victory) => { result = victory; }, () => {},
        fates, factions, { audio: false, speed: 1 },
        { isPvp: true, seed, opponentUnits: b });
    battle.startBattle();

    const start = vt;
    while (result === undefined && vt - start < MAX_MS) {
        vt += tickMs;
        // fire due timeouts (double attacks, charge-ups, end-of-battle)
        timeoutQueue.sort((x, y) => x.at - y.at);
        while (timeoutQueue.length && timeoutQueue[0].at <= vt) {
            const t = timeoutQueue.shift();
            try { t.fn(); } catch (e) { console.error('timeout cb', e); }
        }
        if (result !== undefined) break;
        if (intervalAlive && tickFn) {
            try { tickFn(); } catch (e) { console.error('tick', e); result = null; break; }
        }
    }
    // drain pending end-of-battle timeout if combat just resolved
    timeoutQueue.sort((x, y) => x.at - y.at);
    for (const t of timeoutQueue) { if (result === undefined) { try { t.fn(); } catch (e) {} } }
    document.getElementById('battle-grid').innerHTML = '';
    return { win: result === undefined ? null : result, t: vt - start };
}

// --- batch API used by the driver ---
window.simReady = true;
window.HEROES = HEROES;
window.runMatch = runMatch;
window.runBatch = (matches) => matches.map(m => {
    const r = runMatch(m.a, m.b, m.seed);
    return { a: m.a.join('+'), b: m.b.join('+'), seed: m.seed, win: r.win, t: r.t };
});
document.getElementById('sim-status').textContent = 'sim ready — heroes: ' + HEROES.length;
</script>
</body>
</html>
